        // --- ESTADO Y LÓGICA ---
        let currentPageIndex = 0;

        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav');
            nav.innerHTML = PAGES.map((page, idx) => `
                <button 
                    onclick="setPage(${idx})"
                    class="w-full text-left px-4 py-3 rounded-lg text-sm transition-all flex items-center gap-3 ${
                        idx === currentPageIndex 
                        ? 'bg-blue-50 text-blue-700 font-medium border border-blue-100' 
                        : 'text-slate-600 hover:bg-slate-50'
                    }"
                >
                    <i data-lucide="${page.icon}" class="h-4 w-4"></i>
                    <span class="truncate">${page.title}</span>
                </button>
            `).join('');
            lucide.createIcons();
        }

        function renderPage() {
            const page = PAGES[currentPageIndex];
            
            // Animación de entrada
            const container = document.getElementById('page-content');
            container.parentElement.classList.remove('fade-in');
            void container.parentElement.offsetWidth; // trigger reflow
            container.parentElement.classList.add('fade-in');

            // Actualizar contenido
            document.getElementById('page-badge').textContent = `Página ${currentPageIndex + 1}`;
            document.getElementById('page-total').textContent = `/ ${PAGES.length}`;
            document.getElementById('page-title').textContent = page.title;
            document.getElementById('page-content').innerHTML = page.content;
            
            // Móvil
            document.getElementById('mobile-page-indicator').textContent = `Página ${currentPageIndex + 1} de ${PAGES.length}`;

            // Botones
            document.getElementById('btn-prev').disabled = currentPageIndex === 0;
            document.getElementById('btn-next').disabled = currentPageIndex === PAGES.length - 1;

            // Scroll top
            document.getElementById('scroll-container').scrollTop = 0;

            renderSidebar(); // Para actualizar el estado activo
            lucide.createIcons(); // Renderizar iconos nuevos
        }

        function setPage(index) {
            currentPageIndex = index;
            renderPage();
        }

        function nextPage() {
            if (currentPageIndex < PAGES.length - 1) {
                currentPageIndex++;
                renderPage();
            }
        }

        function prevPage() {
            if (currentPageIndex > 0) {
                currentPageIndex--;
                renderPage();
            }
        }

        // Lógica de Tabs (Pestañas)
        window.switchTab = function(targetId) {
            // Quitar clase activa de todos los botones
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('tab-active');
                btn.classList.add('text-slate-500');
                if(btn.dataset.target === targetId) {
                    btn.classList.add('tab-active');
                    btn.classList.remove('text-slate-500');
                }
            });

            // Ocultar todos los contenidos
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            // Mostrar el target
            document.getElementById('tab-' + targetId).classList.add('active');
        }

        // INICIALIZACIÓN
        document.addEventListener('DOMContentLoaded', () => {
            renderPage();
        });

    </script>
